# AIAlchemy NGINX Gateway Configuration
# Routes traffic between frontend and backend services

upstream backend {
    server aialchemy-backend-url.a.run.app:443;
    keepalive 32;
}

upstream frontend {
    server aialchemy-frontend-url.a.run.app:443;
    keepalive 32;
}

# Rate limiting
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=general:10m rate=30r/s;

server {
    listen 8080;
    server_name _;
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # Enable gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/xml+rss
        application/json
        application/xml
        image/svg+xml;
    
    # Proxy settings for Cloud Run
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_ssl_server_name on;
    proxy_ssl_verify off;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    
    # Timeouts
    proxy_connect_timeout 5s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
    
    # Buffer settings
    proxy_buffering on;
    proxy_buffer_size 4k;
    proxy_buffers 8 4k;
    proxy_busy_buffers_size 8k;
    
    # API routes - route to backend service
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        
        # Remove /api prefix before forwarding
        rewrite ^/api/(.*) /$1 break;
        
        proxy_pass https://backend;
        
        # API specific headers
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        
        # CORS headers for API
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization" always;
        add_header Access-Control-Expose-Headers "Content-Length,Content-Range" always;
        
        # Handle preflight requests
        if ($request_method = 'OPTIONS') {
            return 204;
        }
    }
    
    # API documentation routes
    location ~ ^/(docs|redoc|openapi\.json) {
        limit_req zone=general burst=10 nodelay;
        proxy_pass https://backend;
    }
    
    # Health check for the gateway itself
    location /health {
        access_log off;
        return 200 "Gateway healthy\n";
        add_header Content-Type text/plain;
    }
    
    # Backend health check (proxied)
    location /api/health {
        proxy_pass https://backend/health;
        access_log off;
    }
    
    # Static assets from frontend with caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        limit_req zone=general burst=50 nodelay;
        
        proxy_pass https://frontend;
        
        # Cache static assets
        expires 1y;
        add_header Cache-Control "public, immutable";
        
        # Optional: serve from local cache if backend is down
        proxy_cache_valid 200 1d;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
    }
    
    # All other routes - route to frontend (SPA routing)
    location / {
        limit_req zone=general burst=30 nodelay;
        
        proxy_pass https://frontend;
        
        # Handle SPA routing
        proxy_intercept_errors on;
        error_page 404 = @fallback;
    }
    
    # Fallback for SPA routing
    location @fallback {
        proxy_pass https://frontend/index.html;
    }
    
    # Security - deny access to sensitive files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    # Deny access to common attack patterns
    location ~* \.(env|log|conf)$ {
        deny all;
        access_log off;
        log_not_found off;
    }
}