events {
    worker_connections 1024;
}

http {
    # Enable gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    
    # Basic security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    
    # Define upstream services (will be replaced with actual URLs during deployment)
    upstream backend {
        server BACKEND_HOST:443;
    }
    
    upstream frontend {
        server FRONTEND_HOST:443;
    }

    server {
        listen 8080;
        server_name _;
        
        # Health check endpoint for the gateway itself
        location /gateway/health {
            access_log off;
            return 200 "Gateway healthy\n";
            add_header Content-Type text/plain;
        }
        
        # Backend API routes
        location /api/ {
            proxy_pass https://backend;
            proxy_set_header Host BACKEND_HOST;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_ssl_server_name on;
            proxy_ssl_verify off;
        }
        
        # API Documentation
        location /docs {
            proxy_pass https://backend;
            proxy_set_header Host BACKEND_HOST;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_ssl_server_name on;
            proxy_ssl_verify off;
        }
        
        # ReDoc API Documentation
        location /redoc {
            proxy_pass https://backend;
            proxy_set_header Host BACKEND_HOST;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_ssl_server_name on;
            proxy_ssl_verify off;
        }
        
        # OpenAPI JSON
        location /openapi.json {
            proxy_pass https://backend;
            proxy_set_header Host BACKEND_HOST;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_ssl_server_name on;
            proxy_ssl_verify off;
        }
        
        # Health check endpoint
        location /health {
            proxy_pass https://backend;
            proxy_set_header Host BACKEND_HOST;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_ssl_server_name on;
            proxy_ssl_verify off;
        }
        
        # Frontend routes (everything else)
        location / {
            proxy_pass https://frontend;
            proxy_set_header Host FRONTEND_HOST;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_ssl_server_name on;
            proxy_ssl_verify off;
        }
    }
}