name: 🚀 Deploy AIAlchemy to GCP

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      gateway_type:
        description: 'Gateway type (nginx, load-balancer, none)'
        required: false
        default: 'nginx'
        type: choice
        options:
          - nginx
          - load-balancer  
          - none
      domain_name:
        description: 'Domain name (required for load-balancer)'
        required: false
        type: string

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GAR_LOCATION: us-central1
  REPOSITORY: aialchemy-repo
  REGION: us-central1
  GATEWAY_TYPE: ${{ github.event.inputs.gateway_type || 'nginx' }}
  DOMAIN_NAME: ${{ github.event.inputs.domain_name || secrets.DOMAIN_NAME }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔐 Google Auth
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: 🛠️ Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v1

      - name: 🔧 Enable Required APIs
        run: |
          gcloud services enable run.googleapis.com
          gcloud services enable cloudbuild.googleapis.com
          gcloud services enable sql-component.googleapis.com
          if [ "$GATEWAY_TYPE" = "load-balancer" ]; then
            gcloud services enable compute.googleapis.com
            gcloud services enable certificatemanager.googleapis.com
          fi

      - name: 🐳 Configure Docker
        run: gcloud auth configure-docker us-central1-docker.pkg.dev

      - name: 🏗️ Build and Push Backend
        run: |
          cd backend
          docker build -t us-central1-docker.pkg.dev/$PROJECT_ID/aialchemy-repo/backend:$GITHUB_SHA .
          docker push us-central1-docker.pkg.dev/$PROJECT_ID/aialchemy-repo/backend:$GITHUB_SHA

      - name: 🏗️ Build and Push Frontend
        run: |
          cd frontend
          docker build -t us-central1-docker.pkg.dev/$PROJECT_ID/aialchemy-repo/frontend:$GITHUB_SHA .
          docker push us-central1-docker.pkg.dev/$PROJECT_ID/aialchemy-repo/frontend:$GITHUB_SHA

      - name: 🏗️ Build and Push Gateway
        if: env.GATEWAY_TYPE == 'nginx'
        run: |
          cd gateway
          docker build -t us-central1-docker.pkg.dev/$PROJECT_ID/aialchemy-repo/gateway:$GITHUB_SHA .
          docker push us-central1-docker.pkg.dev/$PROJECT_ID/aialchemy-repo/gateway:$GITHUB_SHA

      - name: 🚀 Deploy Backend to Cloud Run
        run: |
          gcloud run deploy aialchemy-backend \
            --image=us-central1-docker.pkg.dev/$PROJECT_ID/aialchemy-repo/backend:$GITHUB_SHA \
            --region=$REGION \
            --service-account=aialchemy-app-sa@$PROJECT_ID.iam.gserviceaccount.com \
            --set-env-vars="ENVIRONMENT=production,GOOGLE_CLOUD_PROJECT=$PROJECT_ID" \
            --memory=2Gi \
            --cpu=2 \
            --min-instances=1 \
            --max-instances=10 \
            --allow-unauthenticated

      - name: 🚀 Deploy Frontend to Cloud Run
        run: |
          BACKEND_URL=$(gcloud run services describe aialchemy-backend --region=$REGION --format='value(status.url)')
          
          gcloud run deploy aialchemy-frontend \
            --image=us-central1-docker.pkg.dev/$PROJECT_ID/aialchemy-repo/frontend:$GITHUB_SHA \
            --region=$REGION \
            --set-env-vars="REACT_APP_API_BASE_URL=$BACKEND_URL,REACT_APP_ENVIRONMENT=production" \
            --memory=1Gi \
            --cpu=1 \
            --min-instances=1 \
            --max-instances=5 \
            --allow-unauthenticated

      - name: 🌐 Deploy NGINX Gateway
        if: env.GATEWAY_TYPE == 'nginx'
        run: |
          BACKEND_URL=$(gcloud run services describe aialchemy-backend --region=$REGION --format='value(status.url)')
          FRONTEND_URL=$(gcloud run services describe aialchemy-frontend --region=$REGION --format='value(status.url)')
          
          gcloud run deploy aialchemy-gateway \
            --image=us-central1-docker.pkg.dev/$PROJECT_ID/aialchemy-repo/gateway:$GITHUB_SHA \
            --region=$REGION \
            --set-env-vars="BACKEND_URL=$BACKEND_URL,FRONTEND_URL=$FRONTEND_URL" \
            --memory=512Mi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=10 \
            --timeout=300 \
            --allow-unauthenticated

      - name: 🌐 Setup Cloud Load Balancer
        if: env.GATEWAY_TYPE == 'load-balancer'
        run: |
          if [ -z "$DOMAIN_NAME" ]; then
            echo "❌ Error: DOMAIN_NAME is required for load-balancer gateway type"
            echo "Please set DOMAIN_NAME secret or provide it as workflow input"
            exit 1
          fi
          
          echo "🔧 Setting up Cloud Load Balancer for domain: $DOMAIN_NAME"
          
          # Make setup script executable and run it
          chmod +x ./gateway/load-balancer-setup.sh
          DOMAIN_NAME="$DOMAIN_NAME" ./gateway/load-balancer-setup.sh

      - name: 🎉 Get Deployment URLs
        run: |
          echo "🌐 Backend URL: $(gcloud run services describe aialchemy-backend --region=$REGION --format='value(status.url)')"
          echo "🌐 Frontend URL: $(gcloud run services describe aialchemy-frontend --region=$REGION --format='value(status.url)')"
          
          if [ "$GATEWAY_TYPE" = "nginx" ]; then
            GATEWAY_URL=$(gcloud run services describe aialchemy-gateway --region=$REGION --format='value(status.url)' 2>/dev/null || echo "Gateway not deployed")
            echo "🌐 Gateway URL: $GATEWAY_URL"
            echo "🔀 Access your application through gateway:"
            echo "   Frontend: $GATEWAY_URL"
            echo "   API: $GATEWAY_URL/api/"
            echo "   Docs: $GATEWAY_URL/docs"
          elif [ "$GATEWAY_TYPE" = "load-balancer" ]; then
            EXTERNAL_IP=$(gcloud compute forwarding-rules describe aialchemy-gateway-https-rule --global --format='value(IPAddress)' 2>/dev/null || echo "Load balancer not found")
            echo "🌐 Load Balancer IP: $EXTERNAL_IP"
            echo "🌐 Domain: https://$DOMAIN_NAME"
            echo "📋 Ensure DNS A record points to: $EXTERNAL_IP"
            echo "🔀 Access your application (after DNS propagation):"
            echo "   Frontend: https://$DOMAIN_NAME"
            echo "   API: https://$DOMAIN_NAME/api/"
            echo "   Docs: https://$DOMAIN_NAME/docs"
          else
            echo "🔀 Access services directly:"
            echo "   Frontend: $(gcloud run services describe aialchemy-frontend --region=$REGION --format='value(status.url)')"
            echo "   Backend: $(gcloud run services describe aialchemy-backend --region=$REGION --format='value(status.url)')"
          fi

      - name: 📊 Create Job Summary
        run: |
          echo "# 🎉 AIAlchemy Deployment Complete!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 🚀 Deployed Services" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          BACKEND_URL=$(gcloud run services describe aialchemy-backend --region=$REGION --format='value(status.url)')
          FRONTEND_URL=$(gcloud run services describe aialchemy-frontend --region=$REGION --format='value(status.url)')
          
          echo "| Service | URL |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| 🔧 Backend | [$BACKEND_URL]($BACKEND_URL) |" >> $GITHUB_STEP_SUMMARY
          echo "| 🎨 Frontend | [$FRONTEND_URL]($FRONTEND_URL) |" >> $GITHUB_STEP_SUMMARY
          
          if [ "$GATEWAY_TYPE" = "nginx" ]; then
            GATEWAY_URL=$(gcloud run services describe aialchemy-gateway --region=$REGION --format='value(status.url)' 2>/dev/null || echo "Not deployed")
            echo "| 🌐 Gateway | [$GATEWAY_URL]($GATEWAY_URL) |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "## 🔀 Gateway Access (Recommended)" >> $GITHUB_STEP_SUMMARY
            echo "- **Frontend**: [$GATEWAY_URL]($GATEWAY_URL)" >> $GITHUB_STEP_SUMMARY
            echo "- **API**: [$GATEWAY_URL/api/]($GATEWAY_URL/api/)" >> $GITHUB_STEP_SUMMARY
            echo "- **Docs**: [$GATEWAY_URL/docs]($GATEWAY_URL/docs)" >> $GITHUB_STEP_SUMMARY
          elif [ "$GATEWAY_TYPE" = "load-balancer" ]; then
            EXTERNAL_IP=$(gcloud compute forwarding-rules describe aialchemy-gateway-https-rule --global --format='value(IPAddress)' 2>/dev/null || echo "Not found")
            echo "| 🌐 Load Balancer | https://$DOMAIN_NAME (IP: $EXTERNAL_IP) |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "## 🔀 Load Balancer Access" >> $GITHUB_STEP_SUMMARY
            echo "- **Domain**: [https://$DOMAIN_NAME](https://$DOMAIN_NAME)" >> $GITHUB_STEP_SUMMARY
            echo "- **External IP**: $EXTERNAL_IP" >> $GITHUB_STEP_SUMMARY
            echo "- **API**: [https://$DOMAIN_NAME/api/](https://$DOMAIN_NAME/api/)" >> $GITHUB_STEP_SUMMARY
            echo "- **Docs**: [https://$DOMAIN_NAME/docs](https://$DOMAIN_NAME/docs)" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "📋 **DNS Configuration Required**: Create an A record for '$DOMAIN_NAME' pointing to $EXTERNAL_IP" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 📊 Deployment Details" >> $GITHUB_STEP_SUMMARY
          echo "- **Gateway Type**: $GATEWAY_TYPE" >> $GITHUB_STEP_SUMMARY
          echo "- **Region**: $REGION" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit SHA**: $GITHUB_SHA" >> $GITHUB_STEP_SUMMARY
          echo "- **Deployed at**: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY