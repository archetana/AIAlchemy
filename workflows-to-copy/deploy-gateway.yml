name: 🌐 Deploy Gateway Only

on:
  workflow_dispatch:
    inputs:
      gateway_type:
        description: 'Gateway type'
        required: true
        default: 'nginx'
        type: choice
        options:
          - nginx
          - load-balancer
      domain_name:
        description: 'Domain name (required for load-balancer)'
        required: false
        type: string
      force_rebuild:
        description: 'Force rebuild gateway container'
        required: false
        default: false
        type: boolean

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GAR_LOCATION: us-central1
  REPOSITORY: aialchemy-repo
  REGION: us-central1
  GATEWAY_TYPE: ${{ github.event.inputs.gateway_type }}
  DOMAIN_NAME: ${{ github.event.inputs.domain_name || secrets.DOMAIN_NAME }}

jobs:
  deploy-gateway:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔐 Google Auth
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: 🛠️ Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v1

      - name: 🔧 Enable Required APIs
        run: |
          gcloud services enable run.googleapis.com
          gcloud services enable cloudbuild.googleapis.com
          if [ "$GATEWAY_TYPE" = "load-balancer" ]; then
            gcloud services enable compute.googleapis.com
            gcloud services enable certificatemanager.googleapis.com
          fi

      - name: 🔍 Validate Backend and Frontend Services
        run: |
          echo "🔍 Checking if backend and frontend services exist..."
          BACKEND_URL=$(gcloud run services describe aialchemy-backend --region=$REGION --format='value(status.url)' 2>/dev/null || echo "")
          FRONTEND_URL=$(gcloud run services describe aialchemy-frontend --region=$REGION --format='value(status.url)' 2>/dev/null || echo "")
          
          if [ -z "$BACKEND_URL" ] || [ -z "$FRONTEND_URL" ]; then
            echo "❌ Error: Backend and frontend services must be deployed first"
            echo "Backend URL: $BACKEND_URL"
            echo "Frontend URL: $FRONTEND_URL"
            echo ""
            echo "Please run the main deployment workflow first:"
            echo "gh workflow run 'Deploy AIAlchemy to GCP'"
            exit 1
          fi
          
          echo "✅ Services found:"
          echo "Backend: $BACKEND_URL"
          echo "Frontend: $FRONTEND_URL"

      - name: 🐳 Configure Docker (NGINX only)
        if: env.GATEWAY_TYPE == 'nginx'
        run: gcloud auth configure-docker us-central1-docker.pkg.dev

      - name: 🏗️ Build and Push Gateway (NGINX only)
        if: env.GATEWAY_TYPE == 'nginx' && (github.event.inputs.force_rebuild == 'true' || steps.check-image.conclusion == 'failure')
        run: |
          cd gateway
          docker build -t us-central1-docker.pkg.dev/$PROJECT_ID/aialchemy-repo/gateway:$GITHUB_SHA .
          docker push us-central1-docker.pkg.dev/$PROJECT_ID/aialchemy-repo/gateway:$GITHUB_SHA

      - name: 🌐 Deploy NGINX Gateway
        if: env.GATEWAY_TYPE == 'nginx'
        run: |
          BACKEND_URL=$(gcloud run services describe aialchemy-backend --region=$REGION --format='value(status.url)')
          FRONTEND_URL=$(gcloud run services describe aialchemy-frontend --region=$REGION --format='value(status.url)')
          
          # Try to use existing image first, fallback to building new one
          IMAGE_URI="us-central1-docker.pkg.dev/$PROJECT_ID/aialchemy-repo/gateway:$GITHUB_SHA"
          if ! gcloud container images describe $IMAGE_URI >/dev/null 2>&1 || [ "${{ github.event.inputs.force_rebuild }}" = "true" ]; then
            echo "🏗️ Building new gateway image..."
            cd gateway
            docker build -t $IMAGE_URI .
            docker push $IMAGE_URI
            cd ..
          fi
          
          gcloud run deploy aialchemy-gateway \
            --image=$IMAGE_URI \
            --region=$REGION \
            --set-env-vars="BACKEND_URL=$BACKEND_URL,FRONTEND_URL=$FRONTEND_URL" \
            --memory=512Mi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=10 \
            --timeout=300 \
            --allow-unauthenticated

      - name: 🌐 Setup Cloud Load Balancer
        if: env.GATEWAY_TYPE == 'load-balancer'
        run: |
          if [ -z "$DOMAIN_NAME" ]; then
            echo "❌ Error: DOMAIN_NAME is required for load-balancer gateway type"
            echo "Please set DOMAIN_NAME secret or provide it as workflow input"
            exit 1
          fi
          
          echo "🔧 Setting up Cloud Load Balancer for domain: $DOMAIN_NAME"
          
          # Make setup script executable and run it
          chmod +x ./gateway/load-balancer-setup.sh
          DOMAIN_NAME="$DOMAIN_NAME" ./gateway/load-balancer-setup.sh

      - name: 🎉 Gateway Deployment Results
        run: |
          echo "🌐 Gateway deployment completed!"
          echo ""
          
          if [ "$GATEWAY_TYPE" = "nginx" ]; then
            GATEWAY_URL=$(gcloud run services describe aialchemy-gateway --region=$REGION --format='value(status.url)')
            echo "✅ NGINX Gateway deployed successfully!"
            echo "Gateway URL: $GATEWAY_URL"
            echo ""
            echo "🔀 Access your application:"
            echo "  Frontend: $GATEWAY_URL"
            echo "  API: $GATEWAY_URL/api/"
            echo "  Docs: $GATEWAY_URL/docs"
            echo "  Health: $GATEWAY_URL/health"
          elif [ "$GATEWAY_TYPE" = "load-balancer" ]; then
            EXTERNAL_IP=$(gcloud compute forwarding-rules describe aialchemy-gateway-https-rule --global --format='value(IPAddress)' 2>/dev/null || echo "Not found")
            echo "✅ Cloud Load Balancer configured successfully!"
            echo "External IP: $EXTERNAL_IP"
            echo "Domain: https://$DOMAIN_NAME"
            echo ""
            echo "📋 DNS Configuration Required:"
            echo "Create an A record for '$DOMAIN_NAME' pointing to $EXTERNAL_IP"
            echo ""
            echo "🔀 Access your application (after DNS propagation):"
            echo "  Frontend: https://$DOMAIN_NAME"
            echo "  API: https://$DOMAIN_NAME/api/"
            echo "  Docs: https://$DOMAIN_NAME/docs"
          fi

      - name: 📊 Create Job Summary
        run: |
          echo "# 🌐 Gateway Deployment Complete!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## ⚙️ Configuration" >> $GITHUB_STEP_SUMMARY
          echo "- **Gateway Type**: $GATEWAY_TYPE" >> $GITHUB_STEP_SUMMARY
          echo "- **Region**: $REGION" >> $GITHUB_STEP_SUMMARY
          echo "- **Deployed at**: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "$GATEWAY_TYPE" = "nginx" ]; then
            GATEWAY_URL=$(gcloud run services describe aialchemy-gateway --region=$REGION --format='value(status.url)')
            echo "## 🌐 NGINX Gateway" >> $GITHUB_STEP_SUMMARY
            echo "- **Gateway URL**: [$GATEWAY_URL]($GATEWAY_URL)" >> $GITHUB_STEP_SUMMARY
            echo "- **Frontend**: [$GATEWAY_URL]($GATEWAY_URL)" >> $GITHUB_STEP_SUMMARY
            echo "- **API**: [$GATEWAY_URL/api/]($GATEWAY_URL/api/)" >> $GITHUB_STEP_SUMMARY
            echo "- **Docs**: [$GATEWAY_URL/docs]($GATEWAY_URL/docs)" >> $GITHUB_STEP_SUMMARY
            echo "- **Health**: [$GATEWAY_URL/health]($GATEWAY_URL/health)" >> $GITHUB_STEP_SUMMARY
          elif [ "$GATEWAY_TYPE" = "load-balancer" ]; then
            EXTERNAL_IP=$(gcloud compute forwarding-rules describe aialchemy-gateway-https-rule --global --format='value(IPAddress)' 2>/dev/null || echo "Not found")
            echo "## 🌐 Cloud Load Balancer" >> $GITHUB_STEP_SUMMARY
            echo "- **Domain**: [https://$DOMAIN_NAME](https://$DOMAIN_NAME)" >> $GITHUB_STEP_SUMMARY
            echo "- **External IP**: $EXTERNAL_IP" >> $GITHUB_STEP_SUMMARY
            echo "- **Frontend**: [https://$DOMAIN_NAME](https://$DOMAIN_NAME)" >> $GITHUB_STEP_SUMMARY
            echo "- **API**: [https://$DOMAIN_NAME/api/](https://$DOMAIN_NAME/api/)" >> $GITHUB_STEP_SUMMARY
            echo "- **Docs**: [https://$DOMAIN_NAME/docs](https://$DOMAIN_NAME/docs)" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### 📋 DNS Configuration Required" >> $GITHUB_STEP_SUMMARY
            echo "Create an A record for '$DOMAIN_NAME' pointing to **$EXTERNAL_IP**" >> $GITHUB_STEP_SUMMARY
          fi