# 🚀 GitHub Actions Workflow Template for AIAlchemy
# 
# MANUAL SETUP REQUIRED:
# 1. Copy this file to .github/workflows/deploy-production.yml in your repository
# 2. Add the required secrets to your GitHub repository (see GITHUB_SECRETS_SETUP.md)
# 3. Push to main branch to trigger deployment
#
# This file cannot be automatically committed due to GitHub App workflow permissions.

name: Deploy to Production with GCS

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  PROJECT_ID: ${{ secrets.GOOGLE_CLOUD_PROJECT }}
  REGION: us-central1
  BACKEND_SERVICE: aialchemy-backend
  FRONTEND_SERVICE: aialchemy-frontend
  GATEWAY_SERVICE: aialchemy-gateway
  REPO_NAME: aialchemy-repo

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Google Cloud CLI
      uses: google-github-actions/setup-gcloud@v1
      with:
        project_id: ${{ secrets.GOOGLE_CLOUD_PROJECT }}

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v1
      with:
        credentials_json: ${{ secrets.GCS_SERVICE_ACCOUNT_KEY }}

    - name: Configure Docker for Artifact Registry
      run: |
        gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

    - name: Create GCS service account key file
      run: |
        echo '${{ secrets.GCS_SERVICE_ACCOUNT_KEY }}' > /tmp/gcs-service-account-key.json
        
    - name: Verify GCS setup
      run: |
        echo "🔍 Verifying GCS configuration..."
        
        # Test bucket access
        gsutil ls gs://${{ secrets.GCS_BUCKET_NAME }}/ || echo "Bucket verification failed"
        
        # Test authentication
        gcloud auth list --filter=status:ACTIVE --format="value(account)"

    - name: Enable required APIs
      run: |
        echo "📡 Enabling required APIs..."
        gcloud services enable run.googleapis.com \
          cloudbuild.googleapis.com \
          artifactregistry.googleapis.com \
          storage.googleapis.com

    - name: Create Artifact Registry repository
      run: |
        echo "🏭 Setting up Artifact Registry..."
        if ! gcloud artifacts repositories describe ${{ env.REPO_NAME }} --location=${{ env.REGION }} >/dev/null 2>&1; then
          gcloud artifacts repositories create ${{ env.REPO_NAME }} \
            --repository-format=docker \
            --location=${{ env.REGION }} \
            --description="AIAlchemy Docker images"
          echo "✅ Artifact Registry repository created"
        else
          echo "✅ Artifact Registry repository exists"
        fi

    - name: Build and push backend
      run: |
        echo "🔧 Building and deploying backend..."
        cd backend
        
        # Build backend image
        docker build -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/backend:${{ github.sha }} .
        docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/backend:${{ github.sha }}
        
        # Tag as latest
        docker tag ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/backend:${{ github.sha }} \
                   ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/backend:latest
        docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/backend:latest

    - name: Deploy backend to Cloud Run
      run: |
        echo "🚀 Deploying backend to Cloud Run..."
        
        # Create service account key for runtime
        echo '${{ secrets.GCS_SERVICE_ACCOUNT_KEY }}' | base64 -w 0 > gcs_key_base64.txt
        
        gcloud run deploy ${{ env.BACKEND_SERVICE }} \
          --image ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/backend:latest \
          --platform managed \
          --region ${{ env.REGION }} \
          --allow-unauthenticated \
          --memory 2Gi \
          --cpu 1 \
          --timeout 900 \
          --min-instances 0 \
          --max-instances 10 \
          --port 8080 \
          --set-env-vars="DATABASE_URL=sqlite+aiosqlite://./aialchemy.db,USE_GOOGLE_CLOUD_STORAGE=true,GOOGLE_CLOUD_STORAGE_BUCKET=${{ secrets.GCS_BUCKET_NAME }},GOOGLE_CLOUD_PROJECT=${{ secrets.GOOGLE_CLOUD_PROJECT }},SECRET_KEY=${{ secrets.SECRET_KEY }},JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }},ENVIRONMENT=production,DEBUG=false,BUCKET_APP_STORAGE=${{ secrets.GCS_BUCKET_NAME }},VERTEX_AI_PROJECT=${{ secrets.GOOGLE_CLOUD_PROJECT }},VERTEX_AI_LOCATION=us-central1,GCS_SERVICE_ACCOUNT_KEY_BASE64=$(cat gcs_key_base64.txt)"
        
        # Clean up temporary file
        rm gcs_key_base64.txt

    - name: Build and push frontend
      run: |
        echo "🎨 Building and deploying frontend..."
        cd frontend
        
        # Build frontend image
        docker build -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/frontend:${{ github.sha }} .
        docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/frontend:${{ github.sha }}
        
        # Tag as latest
        docker tag ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/frontend:${{ github.sha }} \
                   ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/frontend:latest
        docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/frontend:latest

    - name: Deploy frontend to Cloud Run
      run: |
        echo "🎨 Deploying frontend to Cloud Run..."
        
        gcloud run deploy ${{ env.FRONTEND_SERVICE }} \
          --image ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/frontend:latest \
          --platform managed \
          --region ${{ env.REGION }} \
          --allow-unauthenticated \
          --memory 1Gi \
          --cpu 1 \
          --timeout 300 \
          --min-instances 0 \
          --max-instances 5 \
          --port 8080 \
          --set-env-vars="REACT_APP_API_URL=/api"

    - name: Build and push gateway
      run: |
        echo "🌐 Building and deploying gateway..."
        cd nginx-gateway
        
        # Build gateway image  
        docker build -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/nginx-gateway:${{ github.sha }} .
        docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/nginx-gateway:${{ github.sha }}
        
        # Tag as latest
        docker tag ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/nginx-gateway:${{ github.sha }} \
                   ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/nginx-gateway:latest
        docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/nginx-gateway:latest

    - name: Get service URLs
      id: get-urls
      run: |
        BACKEND_URL=$(gcloud run services describe ${{ env.BACKEND_SERVICE }} --platform managed --region ${{ env.REGION }} --format 'value(status.url)')
        FRONTEND_URL=$(gcloud run services describe ${{ env.FRONTEND_SERVICE }} --platform managed --region ${{ env.REGION }} --format 'value(status.url)')
        
        echo "BACKEND_URL=$BACKEND_URL" >> $GITHUB_OUTPUT
        echo "FRONTEND_URL=$FRONTEND_URL" >> $GITHUB_OUTPUT
        
        echo "Backend URL: $BACKEND_URL"
        echo "Frontend URL: $FRONTEND_URL"

    - name: Deploy gateway to Cloud Run
      run: |
        echo "🌐 Deploying gateway to Cloud Run..."
        
        # Extract hostnames from URLs
        BACKEND_HOST=$(echo "${{ steps.get-urls.outputs.BACKEND_URL }}" | sed 's|https://||')
        FRONTEND_HOST=$(echo "${{ steps.get-urls.outputs.FRONTEND_URL }}" | sed 's|https://||')
        
        gcloud run deploy ${{ env.GATEWAY_SERVICE }} \
          --image ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/nginx-gateway:latest \
          --platform managed \
          --region ${{ env.REGION }} \
          --allow-unauthenticated \
          --memory 512Mi \
          --cpu 1 \
          --min-instances 0 \
          --max-instances 3 \
          --port 8080 \
          --set-env-vars="BACKEND_HOST=$BACKEND_HOST,FRONTEND_HOST=$FRONTEND_HOST"

    - name: Display deployment summary
      run: |
        echo "🎉 Deployment Complete!"
        echo "================================="
        
        GATEWAY_URL=$(gcloud run services describe ${{ env.GATEWAY_SERVICE }} --platform managed --region ${{ env.REGION }} --format 'value(status.url)')
        
        echo "🌐 Application URL: $GATEWAY_URL"
        echo "🔧 Backend API: ${{ steps.get-urls.outputs.BACKEND_URL }}"
        echo "🎨 Frontend: ${{ steps.get-urls.outputs.FRONTEND_URL }}"
        echo ""
        echo "📊 Test endpoints:"
        echo "- Health check: $GATEWAY_URL/health"
        echo "- API status: $GATEWAY_URL/api/status"  
        echo "- Dashboard: $GATEWAY_URL/"
        echo "- File upload: $GATEWAY_URL/api/uploads/startup/1/files"
        echo ""
        echo "🗂️ File Storage: gs://${{ secrets.GCS_BUCKET_NAME }}"
        echo "📝 All services deployed successfully with GCS integration!"

    - name: Run basic health checks
      run: |
        echo "🧪 Running basic health checks..."
        
        GATEWAY_URL=$(gcloud run services describe ${{ env.GATEWAY_SERVICE }} --platform managed --region ${{ env.REGION }} --format 'value(status.url)')
        BACKEND_URL=${{ steps.get-urls.outputs.BACKEND_URL }}
        
        # Wait a moment for services to be ready
        sleep 10
        
        # Test backend health
        echo "Testing backend health..."
        curl -f "$BACKEND_URL/health" || echo "Backend health check failed"
        
        # Test gateway health  
        echo "Testing gateway health..."
        curl -f "$GATEWAY_URL/health" || echo "Gateway health check failed"
        
        echo "✅ Health checks completed"