# GitHub Actions workflow for deploying AIAlchemy to Google Cloud Platform
# This provides an alternative to Cloud Build for CI/CD

name: 🚀 Deploy to Google Cloud Platform

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GAR_LOCATION: us-central1
  REPOSITORY: aialchemy-repo
  SERVICE_BACKEND: aialchemy-backend
  SERVICE_FRONTEND: aialchemy-frontend
  REGION: us-central1

jobs:
  # Job 1: Test Backend
  test-backend:
    name: 🐍 Test Backend
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_aialchemy
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install Dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: 🔍 Code Quality Checks
        run: |
          cd backend
          black --check app/ tests/
          isort --check-only app/ tests/
          flake8 app/ tests/
          mypy app/

      - name: 🧪 Run Tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_aialchemy
          REDIS_URL: redis://localhost:6379/0
          TESTING: true
        run: |
          cd backend
          pytest tests/ -v --cov=app --cov-report=xml --cov-report=term-missing

      - name: 📊 Upload Coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./backend/coverage.xml
          flags: backend
          name: backend-coverage

  # Job 2: Test Frontend
  test-frontend:
    name: ⚛️ Test Frontend
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 📦 Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 📦 Install Dependencies
        run: |
          cd frontend
          npm ci

      - name: 🔍 TypeScript Check
        run: |
          cd frontend
          npm run type-check

      - name: 🎨 ESLint Check
        run: |
          cd frontend
          npm run lint

      - name: 🧪 Run Tests
        run: |
          cd frontend
          npm run test -- --coverage --watchAll=false

      - name: 🏗️ Build Application
        run: |
          cd frontend
          npm run build

      - name: 📊 Upload Coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./frontend/coverage/lcov.info
          flags: frontend
          name: frontend-coverage

  # Job 3: Security Scanning
  security-scan:
    name: 🛡️ Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🔒 Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: 📤 Upload Trivy scan results to GitHub Security
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  # Job 4: Build and Deploy
  deploy:
    name: 🚀 Build and Deploy
    needs: [test-backend, test-frontend, security-scan]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' # Only deploy on push, not PR
    
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🔐 Google Auth
        id: auth
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: 🛠️ Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v1

      - name: 🐳 Configure Docker to use gcloud as a credential helper
        run: |
          gcloud auth configure-docker $GAR_LOCATION-docker.pkg.dev

      - name: 🏗️ Build Backend Image
        run: |
          docker build -t $GAR_LOCATION-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/backend:$GITHUB_SHA ./backend
          docker tag $GAR_LOCATION-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/backend:$GITHUB_SHA \
                     $GAR_LOCATION-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/backend:latest

      - name: 🏗️ Build Frontend Image
        run: |
          docker build -t $GAR_LOCATION-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/frontend:$GITHUB_SHA ./frontend
          docker tag $GAR_LOCATION-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/frontend:$GITHUB_SHA \
                     $GAR_LOCATION-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/frontend:latest

      - name: 📤 Push Images to Artifact Registry
        run: |
          docker push $GAR_LOCATION-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/backend:$GITHUB_SHA
          docker push $GAR_LOCATION-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/backend:latest
          docker push $GAR_LOCATION-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/frontend:$GITHUB_SHA
          docker push $GAR_LOCATION-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/frontend:latest

      # Deploy to Staging Environment
      - name: 🧪 Deploy to Staging
        if: github.ref == 'refs/heads/develop'
        run: |
          echo "🚀 Deploying to staging environment"
          
          # Deploy backend to staging
          gcloud run deploy $SERVICE_BACKEND-staging \
            --image=$GAR_LOCATION-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/backend:$GITHUB_SHA \
            --region=$REGION \
            --service-account=app-service-account@$PROJECT_ID.iam.gserviceaccount.com \
            --set-env-vars="ENVIRONMENT=staging,GOOGLE_CLOUD_PROJECT=$PROJECT_ID" \
            --set-cloudsql-instances=$PROJECT_ID:$REGION:aialchemy-db-staging \
            --memory=2Gi \
            --cpu=2 \
            --min-instances=0 \
            --max-instances=10 \
            --allow-unauthenticated
          
          # Get backend URL for frontend
          BACKEND_URL=$(gcloud run services describe $SERVICE_BACKEND-staging \
            --region=$REGION --format='value(status.url)')
          
          # Deploy frontend to staging
          gcloud run deploy $SERVICE_FRONTEND-staging \
            --image=$GAR_LOCATION-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/frontend:$GITHUB_SHA \
            --region=$REGION \
            --set-env-vars="REACT_APP_API_BASE_URL=$BACKEND_URL,REACT_APP_ENVIRONMENT=staging" \
            --memory=1Gi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=5 \
            --allow-unauthenticated
          
          echo "✅ Staging deployment completed"

      # Deploy to Production Environment
      - name: 🏭 Deploy to Production
        if: github.ref == 'refs/heads/main'
        run: |
          echo "🚀 Deploying to production environment"
          
          # Deploy backend to production
          gcloud run deploy $SERVICE_BACKEND \
            --image=$GAR_LOCATION-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/backend:$GITHUB_SHA \
            --region=$REGION \
            --service-account=app-service-account@$PROJECT_ID.iam.gserviceaccount.com \
            --set-env-vars="ENVIRONMENT=production,GOOGLE_CLOUD_PROJECT=$PROJECT_ID" \
            --set-cloudsql-instances=$PROJECT_ID:$REGION:aialchemy-db \
            --memory=4Gi \
            --cpu=2 \
            --min-instances=2 \
            --max-instances=100 \
            --allow-unauthenticated
          
          # Get backend URL for frontend
          BACKEND_URL=$(gcloud run services describe $SERVICE_BACKEND \
            --region=$REGION --format='value(status.url)')
          
          # Deploy frontend to production
          gcloud run deploy $SERVICE_FRONTEND \
            --image=$GAR_LOCATION-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/frontend:$GITHUB_SHA \
            --region=$REGION \
            --set-env-vars="REACT_APP_API_BASE_URL=$BACKEND_URL,REACT_APP_ENVIRONMENT=production" \
            --memory=2Gi \
            --cpu=2 \
            --min-instances=1 \
            --max-instances=50 \
            --allow-unauthenticated
          
          echo "🎉 Production deployment completed!"

      # Run Post-Deployment Tests
      - name: 🧪 Post-Deployment Tests
        run: |
          if [[ "$GITHUB_REF" == "refs/heads/main" ]]; then
            # Test production
            BACKEND_URL=$(gcloud run services describe $SERVICE_BACKEND \
              --region=$REGION --format='value(status.url)')
            FRONTEND_URL=$(gcloud run services describe $SERVICE_FRONTEND \
              --region=$REGION --format='value(status.url)')
            
            echo "🏥 Testing production endpoints"
            curl -f "$BACKEND_URL/health" || exit 1
            curl -f "$FRONTEND_URL/health" || exit 1
            
          elif [[ "$GITHUB_REF" == "refs/heads/develop" ]]; then
            # Test staging
            BACKEND_URL=$(gcloud run services describe $SERVICE_BACKEND-staging \
              --region=$REGION --format='value(status.url)')
            FRONTEND_URL=$(gcloud run services describe $SERVICE_FRONTEND-staging \
              --region=$REGION --format='value(status.url)')
            
            echo "🏥 Testing staging endpoints"
            curl -f "$BACKEND_URL/health" || exit 1
            curl -f "$FRONTEND_URL/health" || exit 1
          fi

      # Notify on Success
      - name: 🎉 Deployment Success Notification
        if: success()
        run: |
          if [[ "$GITHUB_REF" == "refs/heads/main" ]]; then
            echo "🎉 Production deployment successful!"
            echo "🌐 Backend URL: $(gcloud run services describe $SERVICE_BACKEND --region=$REGION --format='value(status.url)')"
            echo "🌐 Frontend URL: $(gcloud run services describe $SERVICE_FRONTEND --region=$REGION --format='value(status.url)')"
          elif [[ "$GITHUB_REF" == "refs/heads/develop" ]]; then
            echo "🎉 Staging deployment successful!"
            echo "🌐 Backend URL: $(gcloud run services describe $SERVICE_BACKEND-staging --region=$REGION --format='value(status.url)')"
            echo "🌐 Frontend URL: $(gcloud run services describe $SERVICE_FRONTEND-staging --region=$REGION --format='value(status.url)')"
          fi