name: 🚀 Deploy AIAlchemy with Nginx Gateway

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      gateway_only:
        description: 'Deploy nginx gateway only (skip backend/frontend)'
        required: false
        default: false
        type: boolean

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  GATEWAY_ONLY: ${{ github.event.inputs.gateway_only == 'true' }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔐 Google Auth
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: 🛠️ Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v1

      - name: 🔧 Enable Required APIs
        run: |
          gcloud services enable run.googleapis.com
          gcloud services enable cloudbuild.googleapis.com

      - name: 🐳 Configure Docker
        if: env.GATEWAY_ONLY != 'true'
        run: gcloud auth configure-docker us-central1-docker.pkg.dev

      - name: 🏗️ Build and Push Backend
        if: env.GATEWAY_ONLY != 'true'
        run: |
          cd backend
          docker build -t us-central1-docker.pkg.dev/$PROJECT_ID/aialchemy-repo/backend:$GITHUB_SHA .
          docker push us-central1-docker.pkg.dev/$PROJECT_ID/aialchemy-repo/backend:$GITHUB_SHA

      - name: 🏗️ Build and Push Frontend
        if: env.GATEWAY_ONLY != 'true'
        run: |
          cd frontend
          docker build -t us-central1-docker.pkg.dev/$PROJECT_ID/aialchemy-repo/frontend:$GITHUB_SHA .
          docker push us-central1-docker.pkg.dev/$PROJECT_ID/aialchemy-repo/frontend:$GITHUB_SHA

      - name: 🚀 Deploy Backend to Cloud Run
        if: env.GATEWAY_ONLY != 'true'
        run: |
          gcloud run deploy aialchemy-backend \
            --image=us-central1-docker.pkg.dev/$PROJECT_ID/aialchemy-repo/backend:$GITHUB_SHA \
            --region=$REGION \
            --memory=2Gi --cpu=2 --min-instances=1 --max-instances=10 \
            --allow-unauthenticated

      - name: 🚀 Deploy Frontend to Cloud Run
        if: env.GATEWAY_ONLY != 'true'
        run: |
          gcloud run deploy aialchemy-frontend \
            --image=us-central1-docker.pkg.dev/$PROJECT_ID/aialchemy-repo/frontend:$GITHUB_SHA \
            --region=$REGION \
            --set-env-vars="REACT_APP_API_BASE_URL=/api,REACT_APP_ENVIRONMENT=production" \
            --memory=1Gi --cpu=1 --min-instances=1 --max-instances=5 \
            --allow-unauthenticated

      - name: 🌐 Deploy Nginx Gateway
        run: |
          # Get service URLs
          BACKEND_URL=$(gcloud run services describe aialchemy-backend --region=$REGION --format='value(status.url)')
          FRONTEND_URL=$(gcloud run services describe aialchemy-frontend --region=$REGION --format='value(status.url)')
          BACKEND_HOST=$(echo $BACKEND_URL | sed 's|https://||')
          FRONTEND_HOST=$(echo $FRONTEND_URL | sed 's|https://||')
          
          # Build and deploy nginx gateway
          cd nginx-gateway
          docker build -t us-central1-docker.pkg.dev/$PROJECT_ID/aialchemy-repo/gateway:$GITHUB_SHA .
          docker push us-central1-docker.pkg.dev/$PROJECT_ID/aialchemy-repo/gateway:$GITHUB_SHA
          
          gcloud run deploy aialchemy-gateway \
            --image=us-central1-docker.pkg.dev/$PROJECT_ID/aialchemy-repo/gateway:$GITHUB_SHA \
            --region=$REGION \
            --set-env-vars="BACKEND_HOST=$BACKEND_HOST,FRONTEND_HOST=$FRONTEND_HOST" \
            --memory=256Mi --cpu=1 --min-instances=1 --max-instances=3 \
            --port=8080 --allow-unauthenticated
