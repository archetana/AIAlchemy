name: 🚀 Deploy AIAlchemy to GCP

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_gateway:
        description: 'Deploy/Update Cloud Load Balancer Gateway'
        required: false
        default: true
        type: boolean
      domain_name:
        description: 'Domain name (required for gateway)'
        required: false
        type: string
      gateway_only:
        description: 'Deploy gateway only (skip backend/frontend)'
        required: false
        default: false
        type: boolean

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GAR_LOCATION: us-central1
  REPOSITORY: aialchemy-repo
  REGION: us-central1
  DEPLOY_GATEWAY: ${{ github.event.inputs.deploy_gateway != 'false' }}
  DOMAIN_NAME: ${{ github.event.inputs.domain_name || secrets.DOMAIN_NAME }}
  GATEWAY_ONLY: ${{ github.event.inputs.gateway_only == 'true' }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔐 Google Auth
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: 🛠️ Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v1

      - name: 🔧 Enable Required APIs
        run: |
          gcloud services enable run.googleapis.com
          gcloud services enable cloudbuild.googleapis.com
          gcloud services enable sql-component.googleapis.com
          if [ "$DEPLOY_GATEWAY" = "true" ]; then
            gcloud services enable compute.googleapis.com
            gcloud services enable certificatemanager.googleapis.com
          fi

      - name: 🔍 Validate Gateway Requirements
        if: env.DEPLOY_GATEWAY == 'true' && env.GATEWAY_ONLY == 'true'
        run: |
          echo "🔍 Checking if backend and frontend services exist for gateway-only deployment..."
          BACKEND_URL=$(gcloud run services describe aialchemy-backend --region=$REGION --format='value(status.url)' 2>/dev/null || echo "")
          FRONTEND_URL=$(gcloud run services describe aialchemy-frontend --region=$REGION --format='value(status.url)' 2>/dev/null || echo "")
          
          if [ -z "$BACKEND_URL" ] || [ -z "$FRONTEND_URL" ]; then
            echo "❌ Error: Backend and frontend services must exist for gateway-only deployment"
            echo "Backend URL: $BACKEND_URL"
            echo "Frontend URL: $FRONTEND_URL"
            echo ""
            echo "Please run a full deployment first (set gateway_only: false)"
            exit 1
          fi
          
          echo "✅ Services found:"
          echo "Backend: $BACKEND_URL"
          echo "Frontend: $FRONTEND_URL"

      - name: 🐳 Configure Docker
        if: env.GATEWAY_ONLY != 'true'
        run: gcloud auth configure-docker us-central1-docker.pkg.dev

      - name: 🏗️ Build and Push Backend
        if: env.GATEWAY_ONLY != 'true'
        run: |
          cd backend
          docker build -t us-central1-docker.pkg.dev/$PROJECT_ID/aialchemy-repo/backend:$GITHUB_SHA .
          docker push us-central1-docker.pkg.dev/$PROJECT_ID/aialchemy-repo/backend:$GITHUB_SHA

      - name: 🏗️ Build and Push Frontend
        if: env.GATEWAY_ONLY != 'true'
        run: |
          cd frontend
          docker build -t us-central1-docker.pkg.dev/$PROJECT_ID/aialchemy-repo/frontend:$GITHUB_SHA .
          docker push us-central1-docker.pkg.dev/$PROJECT_ID/aialchemy-repo/frontend:$GITHUB_SHA

      - name: 🚀 Deploy Backend to Cloud Run
        if: env.GATEWAY_ONLY != 'true'
        run: |
          gcloud run deploy aialchemy-backend \
            --image=us-central1-docker.pkg.dev/$PROJECT_ID/aialchemy-repo/backend:$GITHUB_SHA \
            --region=$REGION \
            --service-account=aialchemy-app-sa@$PROJECT_ID.iam.gserviceaccount.com \
            --set-env-vars="ENVIRONMENT=production,GOOGLE_CLOUD_PROJECT=$PROJECT_ID" \
            --memory=2Gi \
            --cpu=2 \
            --min-instances=1 \
            --max-instances=10 \
            --allow-unauthenticated

      - name: 🚀 Deploy Frontend to Cloud Run
        if: env.GATEWAY_ONLY != 'true'
        run: |
          BACKEND_URL=$(gcloud run services describe aialchemy-backend --region=$REGION --format='value(status.url)')
          
          gcloud run deploy aialchemy-frontend \
            --image=us-central1-docker.pkg.dev/$PROJECT_ID/aialchemy-repo/frontend:$GITHUB_SHA \
            --region=$REGION \
            --set-env-vars="REACT_APP_API_BASE_URL=$BACKEND_URL,REACT_APP_ENVIRONMENT=production" \
            --memory=1Gi \
            --cpu=1 \
            --min-instances=1 \
            --max-instances=5 \
            --allow-unauthenticated

      - name: 🌐 Setup Cloud Load Balancer Gateway
        if: env.DEPLOY_GATEWAY == 'true'
        run: |
          if [ -z "$DOMAIN_NAME" ]; then
            echo "❌ Error: DOMAIN_NAME is required for Cloud Load Balancer gateway"
            echo "Please set DOMAIN_NAME secret or provide it as workflow input"
            echo "Example: yourdomain.com"
            exit 1
          fi
          
          echo "🔧 Setting up Cloud Load Balancer for domain: $DOMAIN_NAME"
          
          # Verify services exist
          BACKEND_URL=$(gcloud run services describe aialchemy-backend --region=$REGION --format='value(status.url)' 2>/dev/null || echo "")
          FRONTEND_URL=$(gcloud run services describe aialchemy-frontend --region=$REGION --format='value(status.url)' 2>/dev/null || echo "")
          
          if [ -z "$BACKEND_URL" ] || [ -z "$FRONTEND_URL" ]; then
            echo "❌ Error: Backend and frontend services must be deployed before setting up gateway"
            echo "Backend URL: $BACKEND_URL"
            echo "Frontend URL: $FRONTEND_URL"
            exit 1
          fi
          
          echo "✅ Services verified:"
          echo "Backend: $BACKEND_URL"
          echo "Frontend: $FRONTEND_URL"
          
          # Make setup script executable and run it
          chmod +x ./gateway/load-balancer-setup.sh
          DOMAIN_NAME="$DOMAIN_NAME" ./gateway/load-balancer-setup.sh

      - name: 🎉 Get Deployment URLs
        run: |
          BACKEND_URL=$(gcloud run services describe aialchemy-backend --region=$REGION --format='value(status.url)' 2>/dev/null || echo "Not deployed")
          FRONTEND_URL=$(gcloud run services describe aialchemy-frontend --region=$REGION --format='value(status.url)' 2>/dev/null || echo "Not deployed")
          
          echo "🌐 Backend URL: $BACKEND_URL"
          echo "🌐 Frontend URL: $FRONTEND_URL"
          
          if [ "$DEPLOY_GATEWAY" = "true" ] && [ -n "$DOMAIN_NAME" ]; then
            EXTERNAL_IP=$(gcloud compute forwarding-rules describe aialchemy-gateway-https-rule --global --format='value(IPAddress)' 2>/dev/null || echo "Load balancer not found")
            echo "🌐 Load Balancer IP: $EXTERNAL_IP"
            echo "🌐 Gateway Domain: https://$DOMAIN_NAME"
            echo ""
            echo "📋 DNS Configuration Required:"
            echo "   Create an A record for '$DOMAIN_NAME' pointing to $EXTERNAL_IP"
            echo ""
            echo "🔀 Access your application (after DNS propagation):"
            echo "   Frontend: https://$DOMAIN_NAME"
            echo "   API: https://$DOMAIN_NAME/api/"
            echo "   Docs: https://$DOMAIN_NAME/docs"
            echo "   Health: https://$DOMAIN_NAME/health"
          else
            echo ""
            echo "🔀 Direct service access:"
            echo "   Frontend: $FRONTEND_URL"
            echo "   Backend: $BACKEND_URL"
            echo "   API Docs: $BACKEND_URL/docs"
          fi

      - name: 📊 Create Job Summary
        run: |
          echo "# 🎉 AIAlchemy Deployment Complete!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Service URLs
          BACKEND_URL=$(gcloud run services describe aialchemy-backend --region=$REGION --format='value(status.url)' 2>/dev/null || echo "Not deployed")
          FRONTEND_URL=$(gcloud run services describe aialchemy-frontend --region=$REGION --format='value(status.url)' 2>/dev/null || echo "Not deployed")
          
          if [ "$GATEWAY_ONLY" = "true" ]; then
            echo "## 🌐 Gateway Update Only" >> $GITHUB_STEP_SUMMARY
          else
            echo "## 🚀 Deployed Services" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Service | URL |" >> $GITHUB_STEP_SUMMARY
            echo "|---------|-----|" >> $GITHUB_STEP_SUMMARY
            echo "| 🔧 Backend | [$BACKEND_URL]($BACKEND_URL) |" >> $GITHUB_STEP_SUMMARY
            echo "| 🎨 Frontend | [$FRONTEND_URL]($FRONTEND_URL) |" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "$DEPLOY_GATEWAY" = "true" ] && [ -n "$DOMAIN_NAME" ]; then
            EXTERNAL_IP=$(gcloud compute forwarding-rules describe aialchemy-gateway-https-rule --global --format='value(IPAddress)' 2>/dev/null || echo "Not found")
            
            if [ "$GATEWAY_ONLY" != "true" ]; then
              echo "| 🌐 Load Balancer | https://$DOMAIN_NAME (IP: $EXTERNAL_IP) |" >> $GITHUB_STEP_SUMMARY
            fi
            
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "## 🌐 Cloud Load Balancer Gateway" >> $GITHUB_STEP_SUMMARY
            echo "- **Domain**: [https://$DOMAIN_NAME](https://$DOMAIN_NAME)" >> $GITHUB_STEP_SUMMARY
            echo "- **External IP**: $EXTERNAL_IP" >> $GITHUB_STEP_SUMMARY
            echo "- **Frontend**: [https://$DOMAIN_NAME](https://$DOMAIN_NAME)" >> $GITHUB_STEP_SUMMARY
            echo "- **API**: [https://$DOMAIN_NAME/api/](https://$DOMAIN_NAME/api/)" >> $GITHUB_STEP_SUMMARY
            echo "- **Docs**: [https://$DOMAIN_NAME/docs](https://$DOMAIN_NAME/docs)" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### 📋 DNS Configuration Required" >> $GITHUB_STEP_SUMMARY
            echo "Create an A record for **'$DOMAIN_NAME'** pointing to **$EXTERNAL_IP**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### ⏱️ SSL Certificate Provisioning" >> $GITHUB_STEP_SUMMARY
            echo "Google will automatically provision SSL certificate after DNS is configured (15-60 minutes)" >> $GITHUB_STEP_SUMMARY
          elif [ "$DEPLOY_GATEWAY" = "false" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "## 🔗 Direct Service Access" >> $GITHUB_STEP_SUMMARY
            echo "- **Frontend**: [$FRONTEND_URL]($FRONTEND_URL)" >> $GITHUB_STEP_SUMMARY
            echo "- **Backend**: [$BACKEND_URL]($BACKEND_URL)" >> $GITHUB_STEP_SUMMARY
            echo "- **API Docs**: [$BACKEND_URL/docs]($BACKEND_URL/docs)" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 📊 Deployment Details" >> $GITHUB_STEP_SUMMARY
          echo "- **Deployment Type**: $([ "$GATEWAY_ONLY" = "true" ] && echo "Gateway Only" || echo "Full Stack")" >> $GITHUB_STEP_SUMMARY
          echo "- **Gateway**: $([ "$DEPLOY_GATEWAY" = "true" ] && echo "Cloud Load Balancer" || echo "Disabled")" >> $GITHUB_STEP_SUMMARY
          echo "- **Region**: $REGION" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit SHA**: $GITHUB_SHA" >> $GITHUB_STEP_SUMMARY
          echo "- **Deployed at**: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
