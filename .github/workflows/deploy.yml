name: Deploy to Production

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # Allow manual deployment

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1

jobs:
  version-increment:
    runs-on: ubuntu-latest
    name: Increment Version
    outputs:
      version: ${{ steps.increment.outputs.version }}
      build_number: ${{ steps.increment.outputs.build_number }}
      
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Set up Node.js 18
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        
    - name: Increment version
      id: increment
      run: |
        cd frontend
        
        # Set build metadata
        export BUILD_NUMBER=${{ github.run_number }}
        export COMMIT_SHA=${{ github.sha }}
        
        # Run version increment
        python3 scripts/increment-version.py patch
        
        # Get the new version
        VERSION=$(python3 -c "
import re
with open('./src/config/version.js', 'r') as f:
    content = f.read()
major_match = re.search(r'major:\s*(\d+)', content)
minor_match = re.search(r'minor:\s*(\d+)', content)
patch_match = re.search(r'patch:\s*(\d+)', content)
major = int(major_match.group(1)) if major_match else 1
minor = int(minor_match.group(1)) if minor_match else 0
patch = int(patch_match.group(1)) if patch_match else 0
print(f'{major}.{minor}.{patch}')
        ")
        
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "build_number=${{ github.run_number }}" >> $GITHUB_OUTPUT
        
        echo "🎯 New version: $VERSION"
        echo "🏗️ Build number: ${{ github.run_number }}"
        
    - name: Commit version update
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add frontend/src/config/version.js frontend/package.json
        git commit -m "chore: increment version to ${{ steps.increment.outputs.version }} (build ${{ steps.increment.outputs.build_number }})" || exit 0
        git push

  build-and-test:
    runs-on: ubuntu-latest
    name: Build and Test
    needs: version-increment
    
    steps:
    - name: Checkout code (with version updates)
      uses: actions/checkout@v4
      with:
        ref: main  # Get the updated version
        
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Set up Node.js 18
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: 'frontend/package-lock.json'
        
    - name: Install dependencies and run tests
      run: |
        # Backend tests
        cd backend
        python -m pip install --upgrade pip
        pip install -r requirements-core.txt
        pip install pytest pytest-asyncio pytest-httpx
        python run_tests.py
        cd ..
        
        # Frontend tests  
        cd frontend
        npm ci
        npm test -- --coverage --watchAll=false
        cd ..
        
    - name: Build applications with version info
      env:
        REACT_APP_BUILD_NUMBER: ${{ needs.version-increment.outputs.build_number }}
        REACT_APP_COMMIT_HASH: ${{ github.sha }}
        REACT_APP_BUILD_DATE: ${{ github.event.head_commit.timestamp }}
      run: |
        echo "🏗️ Building applications with version ${{ needs.version-increment.outputs.version }}"
        
        # Build backend
        cd backend
        docker build -t aialchemy-backend:${{ needs.version-increment.outputs.version }} .
        cd ..
        
        # Build frontend  
        cd frontend
        npm run build
        docker build -t aialchemy-frontend:${{ needs.version-increment.outputs.version }} .
        cd ..

  deploy-to-gcp:
    runs-on: ubuntu-latest
    name: Deploy to Google Cloud
    needs: [version-increment, build-and-test]
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        ref: main
        
    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v1
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}
        
    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v1
      
    - name: Configure Docker for GCP
      run: gcloud auth configure-docker
      
    - name: Build and push Docker images
      env:
        REACT_APP_BUILD_NUMBER: ${{ needs.version-increment.outputs.build_number }}
        REACT_APP_COMMIT_HASH: ${{ github.sha }}
        REACT_APP_BUILD_DATE: ${{ github.event.head_commit.timestamp }}
      run: |
        VERSION=${{ needs.version-increment.outputs.version }}
        
        # Build and push backend
        cd backend
        docker build -t gcr.io/$PROJECT_ID/aialchemy-backend:$VERSION \
          -t gcr.io/$PROJECT_ID/aialchemy-backend:latest .
        docker push gcr.io/$PROJECT_ID/aialchemy-backend:$VERSION
        docker push gcr.io/$PROJECT_ID/aialchemy-backend:latest
        cd ..
        
        # Build and push frontend
        cd frontend  
        docker build -t gcr.io/$PROJECT_ID/aialchemy-frontend:$VERSION \
          -t gcr.io/$PROJECT_ID/aialchemy-frontend:latest \
          --build-arg REACT_APP_BUILD_NUMBER=$REACT_APP_BUILD_NUMBER \
          --build-arg REACT_APP_COMMIT_HASH=$REACT_APP_COMMIT_HASH \
          --build-arg REACT_APP_BUILD_DATE="$REACT_APP_BUILD_DATE" .
        docker push gcr.io/$PROJECT_ID/aialchemy-frontend:$VERSION  
        docker push gcr.io/$PROJECT_ID/aialchemy-frontend:latest
        cd ..
        
    - name: Deploy to Cloud Run
      run: |
        VERSION=${{ needs.version-increment.outputs.version }}
        
        # Deploy backend
        gcloud run deploy aialchemy-backend \
          --image gcr.io/$PROJECT_ID/aialchemy-backend:$VERSION \
          --platform managed \
          --region $REGION \
          --allow-unauthenticated \
          --memory 2Gi \
          --cpu 2 \
          --max-instances 10
          
        # Deploy frontend
        gcloud run deploy aialchemy-frontend \
          --image gcr.io/$PROJECT_ID/aialchemy-frontend:$VERSION \
          --platform managed \
          --region $REGION \
          --allow-unauthenticated \
          --memory 1Gi \
          --cpu 1 \
          --max-instances 5

  post-deploy:
    runs-on: ubuntu-latest
    name: Post-Deployment Tasks
    needs: [version-increment, deploy-to-gcp]
    
    steps:
    - name: Create GitHub Release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: v${{ needs.version-increment.outputs.version }}
        release_name: AIAlchemy v${{ needs.version-increment.outputs.version }}
        body: |
          ## 🚀 AIAlchemy v${{ needs.version-increment.outputs.version }}
          
          **Build Number:** ${{ needs.version-increment.outputs.build_number }}
          **Commit:** ${{ github.sha }}
          **Deployed:** ${{ github.event.head_commit.timestamp }}
          
          ### 🎯 Features in this release:
          - Phase 1 Data Ingestion with Document AI
          - Gemini Pro integration for memo generation  
          - Enhanced file upload with security scanning
          - Real-time pipeline processing
          - Comprehensive error handling and monitoring
          
          ### 🔧 Technical improvements:
          - Multi-agent AI system architecture
          - Async processing with queue management
          - Database models for processing workflows
          - Production-ready deployment configuration
          
          **Deployment URLs:**
          - Backend API: Available via Cloud Run
          - Frontend App: Available via Cloud Run
          
          See the [deployment documentation](https://github.com/archetana/AIAlchemy/blob/main/README.md) for more details.
        draft: false
        prerelease: false
        
    - name: Deployment Summary
      run: |
        echo "🎉 Deployment Complete!"
        echo "========================"
        echo "Version: v${{ needs.version-increment.outputs.version }}"
        echo "Build: #${{ needs.version-increment.outputs.build_number }}"
        echo "Commit: ${{ github.sha }}"
        echo "Timestamp: $(date -u)"
        echo ""
        echo "✅ Backend deployed to Cloud Run"
        echo "✅ Frontend deployed to Cloud Run" 
        echo "✅ GitHub release created"
        echo "✅ Version incremented automatically"
        echo ""
        echo "🔗 Monitor deployment at: https://console.cloud.google.com/run"