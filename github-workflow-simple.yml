name: 🚀 Deploy AIAlchemy to Google Cloud

on:
  push:
    branches: [main]

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GAR_LOCATION: us-central1
  REPOSITORY: aialchemy-repo
  REGION: us-central1

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🔐 Google Cloud Auth
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: 🛠️ Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v1

      - name: 🐳 Configure Docker
        run: gcloud auth configure-docker us-central1-docker.pkg.dev

      - name: 🏗️ Build and Push Backend Image
        run: |
          cd backend
          docker build -t us-central1-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/backend:$GITHUB_SHA .
          docker push us-central1-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/backend:$GITHUB_SHA

      - name: 🏗️ Build and Push Frontend Image
        run: |
          cd frontend
          docker build -t us-central1-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/frontend:$GITHUB_SHA .
          docker push us-central1-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/frontend:$GITHUB_SHA

      - name: 🚀 Deploy Backend to Cloud Run
        run: |
          gcloud run deploy aialchemy-backend \
            --image=us-central1-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/backend:$GITHUB_SHA \
            --region=$REGION \
            --service-account=aialchemy-app-sa@$PROJECT_ID.iam.gserviceaccount.com \
            --set-env-vars="ENVIRONMENT=production,GOOGLE_CLOUD_PROJECT=$PROJECT_ID" \
            --memory=2Gi \
            --cpu=2 \
            --min-instances=0 \
            --max-instances=10 \
            --allow-unauthenticated \
            --timeout=300

      - name: 🚀 Deploy Frontend to Cloud Run
        run: |
          BACKEND_URL=$(gcloud run services describe aialchemy-backend --region=$REGION --format='value(status.url)')
          
          gcloud run deploy aialchemy-frontend \
            --image=us-central1-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/frontend:$GITHUB_SHA \
            --region=$REGION \
            --set-env-vars="REACT_APP_API_BASE_URL=$BACKEND_URL,REACT_APP_ENVIRONMENT=production" \
            --memory=1Gi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=5 \
            --allow-unauthenticated \
            --timeout=300

      - name: 🎉 Display Deployment URLs
        run: |
          echo "🎉 Deployment completed successfully!"
          echo ""
          echo "🌐 Your AIAlchemy platform is now live at:"
          echo "📱 Frontend: $(gcloud run services describe aialchemy-frontend --region=$REGION --format='value(status.url)')"
          echo "🔧 Backend API: $(gcloud run services describe aialchemy-backend --region=$REGION --format='value(status.url)')"
          echo ""
          echo "🔍 Test your deployment:"
          echo "curl $(gcloud run services describe aialchemy-backend --region=$REGION --format='value(status.url)')/health"