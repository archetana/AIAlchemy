name: 🚀 Deploy AIAlchemy with Nginx Gateway

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      gateway_only:
        description: 'Deploy nginx gateway only (skip backend/frontend)'
        required: false
        default: false
        type: boolean

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GAR_LOCATION: us-central1
  REPOSITORY: aialchemy-repo
  REGION: us-central1
  GATEWAY_ONLY: ${{ github.event.inputs.gateway_only == 'true' }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔐 Google Auth
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: 🛠️ Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v1

      - name: 🔍 Verify Required APIs
        run: |
          echo "Checking if required APIs are enabled..."
          gcloud services list --enabled --filter="name:(run.googleapis.com OR cloudbuild.googleapis.com)" --format="table(name)" || true
          echo "Note: If APIs are missing, they should be manually enabled in GCP Console"

      - name: 🔍 Validate Gateway-Only Requirements
        if: env.GATEWAY_ONLY == 'true'
        run: |
          echo "🔍 Checking if backend and frontend services exist for gateway-only deployment..."
          BACKEND_URL=$(gcloud run services describe aialchemy-backend --region=$REGION --format='value(status.url)' 2>/dev/null || echo "")
          FRONTEND_URL=$(gcloud run services describe aialchemy-frontend --region=$REGION --format='value(status.url)' 2>/dev/null || echo "")
          
          if [ -z "$BACKEND_URL" ] || [ -z "$FRONTEND_URL" ]; then
            echo "❌ Error: Backend and frontend services must exist for gateway-only deployment"
            echo "Backend URL: $BACKEND_URL"
            echo "Frontend URL: $FRONTEND_URL"
            echo "Please run a full deployment first (set gateway_only: false)"
            exit 1
          fi
          
          echo "✅ Services found:"
          echo "Backend: $BACKEND_URL"
          echo "Frontend: $FRONTEND_URL"

      - name: 🐳 Configure Docker
        if: env.GATEWAY_ONLY != 'true'
        run: gcloud auth configure-docker us-central1-docker.pkg.dev

      - name: 🏗️ Build and Push Backend
        if: env.GATEWAY_ONLY != 'true'
        run: |
          cd backend
          docker build -t us-central1-docker.pkg.dev/$PROJECT_ID/aialchemy-repo/backend:$GITHUB_SHA .
          docker push us-central1-docker.pkg.dev/$PROJECT_ID/aialchemy-repo/backend:$GITHUB_SHA

      - name: 🏗️ Build and Push Frontend
        if: env.GATEWAY_ONLY != 'true'
        run: |
          cd frontend
          docker build -t us-central1-docker.pkg.dev/$PROJECT_ID/aialchemy-repo/frontend:$GITHUB_SHA .
          docker push us-central1-docker.pkg.dev/$PROJECT_ID/aialchemy-repo/frontend:$GITHUB_SHA

      - name: 🚀 Deploy Backend to Cloud Run
        if: env.GATEWAY_ONLY != 'true'
        run: |
          gcloud run deploy aialchemy-backend \
            --image=us-central1-docker.pkg.dev/$PROJECT_ID/aialchemy-repo/backend:$GITHUB_SHA \
            --region=$REGION \
            --set-env-vars="ENVIRONMENT=production,GOOGLE_CLOUD_PROJECT=$PROJECT_ID" \
            --memory=2Gi \
            --cpu=2 \
            --min-instances=1 \
            --max-instances=10 \
            --allow-unauthenticated

      - name: 🚀 Deploy Frontend to Cloud Run
        if: env.GATEWAY_ONLY != 'true'
        run: |
          gcloud run deploy aialchemy-frontend \
            --image=us-central1-docker.pkg.dev/$PROJECT_ID/aialchemy-repo/frontend:$GITHUB_SHA \
            --region=$REGION \
            --set-env-vars="REACT_APP_API_BASE_URL=/api,REACT_APP_ENVIRONMENT=production" \
            --memory=1Gi \
            --cpu=1 \
            --min-instances=1 \
            --max-instances=5 \
            --allow-unauthenticated

      - name: 🏗️ Build and Push Nginx Gateway
        run: |
          cd nginx-gateway
          docker build -t us-central1-docker.pkg.dev/$PROJECT_ID/aialchemy-repo/gateway:$GITHUB_SHA .
          docker push us-central1-docker.pkg.dev/$PROJECT_ID/aialchemy-repo/gateway:$GITHUB_SHA

      - name: 🌐 Deploy Nginx Gateway
        run: |
          # Get service URLs for nginx configuration
          BACKEND_URL=$(gcloud run services describe aialchemy-backend --region=$REGION --format='value(status.url)' 2>/dev/null || echo "")
          FRONTEND_URL=$(gcloud run services describe aialchemy-frontend --region=$REGION --format='value(status.url)' 2>/dev/null || echo "")
          
          if [ -z "$BACKEND_URL" ] || [ -z "$FRONTEND_URL" ]; then
            echo "❌ Error: Backend and frontend services must be deployed before setting up gateway"
            echo "Backend URL: $BACKEND_URL"
            echo "Frontend URL: $FRONTEND_URL"
            exit 1
          fi
          
          # Extract hostnames from URLs
          BACKEND_HOST=$(echo $BACKEND_URL | sed 's|https://||')
          FRONTEND_HOST=$(echo $FRONTEND_URL | sed 's|https://||')
          
          echo "✅ Services verified:"
          echo "Backend: $BACKEND_URL"
          echo "Frontend: $FRONTEND_URL"
          echo "Backend Host: $BACKEND_HOST"
          echo "Frontend Host: $FRONTEND_HOST"
          
          # Deploy nginx gateway
          gcloud run deploy aialchemy-gateway \
            --image=us-central1-docker.pkg.dev/$PROJECT_ID/aialchemy-repo/gateway:$GITHUB_SHA \
            --region=$REGION \
            --set-env-vars="BACKEND_HOST=$BACKEND_HOST,FRONTEND_HOST=$FRONTEND_HOST" \
            --memory=256Mi \
            --cpu=1 \
            --min-instances=1 \
            --max-instances=3 \
            --port=8080 \
            --allow-unauthenticated

      - name: 🎉 Get Deployment URLs
        run: |
          BACKEND_URL=$(gcloud run services describe aialchemy-backend --region=$REGION --format='value(status.url)' 2>/dev/null || echo "Not deployed")
          FRONTEND_URL=$(gcloud run services describe aialchemy-frontend --region=$REGION --format='value(status.url)' 2>/dev/null || echo "Not deployed")
          GATEWAY_URL=$(gcloud run services describe aialchemy-gateway --region=$REGION --format='value(status.url)' 2>/dev/null || echo "Not deployed")
          
          echo "🌐 Backend URL: $BACKEND_URL"
          echo "🌐 Frontend URL: $FRONTEND_URL"
          echo "🌐 Gateway URL: $GATEWAY_URL"
          echo ""
          echo "🔀 Access your application via Nginx Gateway:"
          echo "   Frontend: $GATEWAY_URL"
          echo "   API: $GATEWAY_URL/api/"
          echo "   Docs: $GATEWAY_URL/docs"
          echo "   Health: $GATEWAY_URL/health"
          echo ""
          echo "💰 Cost Benefits:"
          echo "   - No load balancer fees (~$25/month saved)"
          echo "   - Pay-per-use pricing only"
          echo "   - Automatic scaling to zero"

      - name: 📊 Create Job Summary
        run: |
          echo "# 🎉 AIAlchemy Nginx Gateway Deployment Complete!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Service URLs
          BACKEND_URL=$(gcloud run services describe aialchemy-backend --region=$REGION --format='value(status.url)' 2>/dev/null || echo "Not deployed")
          FRONTEND_URL=$(gcloud run services describe aialchemy-frontend --region=$REGION --format='value(status.url)' 2>/dev/null || echo "Not deployed")
          GATEWAY_URL=$(gcloud run services describe aialchemy-gateway --region=$REGION --format='value(status.url)' 2>/dev/null || echo "Not deployed")
          
          if [ "$GATEWAY_ONLY" = "true" ]; then
            echo "## 🌐 Gateway Update Only" >> $GITHUB_STEP_SUMMARY
          else
            echo "## 🚀 Deployed Services" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Service | URL |" >> $GITHUB_STEP_SUMMARY
            echo "|---------|-----|" >> $GITHUB_STEP_SUMMARY
            echo "| 🔧 Backend | [$BACKEND_URL]($BACKEND_URL) |" >> $GITHUB_STEP_SUMMARY
            echo "| 🎨 Frontend | [$FRONTEND_URL]($FRONTEND_URL) |" >> $GITHUB_STEP_SUMMARY
            echo "| 🌐 Gateway | [$GATEWAY_URL]($GATEWAY_URL) |" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 🌐 Nginx Gateway Access" >> $GITHUB_STEP_SUMMARY
          echo "- **Main URL**: [$GATEWAY_URL]($GATEWAY_URL)" >> $GITHUB_STEP_SUMMARY
          echo "- **Frontend**: [$GATEWAY_URL]($GATEWAY_URL)" >> $GITHUB_STEP_SUMMARY
          echo "- **API**: [$GATEWAY_URL/api/]($GATEWAY_URL/api/)" >> $GITHUB_STEP_SUMMARY
          echo "- **Docs**: [$GATEWAY_URL/docs]($GATEWAY_URL/docs)" >> $GITHUB_STEP_SUMMARY
          echo "- **Health**: [$GATEWAY_URL/health]($GATEWAY_URL/health)" >> $GITHUB_STEP_SUMMARY
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 💰 Cost Benefits" >> $GITHUB_STEP_SUMMARY
          echo "- **No Load Balancer Fees**: Save ~$25/month" >> $GITHUB_STEP_SUMMARY
          echo "- **Pay-per-Use**: Only charged when processing requests" >> $GITHUB_STEP_SUMMARY
          echo "- **Auto-scaling**: Scales to zero when not used" >> $GITHUB_STEP_SUMMARY
          echo "- **Simple Architecture**: Single nginx proxy for routing" >> $GITHUB_STEP_SUMMARY
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 📊 Deployment Details" >> $GITHUB_STEP_SUMMARY
          echo "- **Deployment Type**: $([ "$GATEWAY_ONLY" = "true" ] && echo "Gateway Only" || echo "Full Stack + Gateway")" >> $GITHUB_STEP_SUMMARY
          echo "- **Gateway Type**: Nginx Proxy (Cloud Run)" >> $GITHUB_STEP_SUMMARY
          echo "- **Region**: $REGION" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit SHA**: $GITHUB_SHA" >> $GITHUB_STEP_SUMMARY
          echo "- **Deployed at**: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY