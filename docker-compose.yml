# Docker Compose configuration for AIAlchemy local development
version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: aialchemy-postgres
    environment:
      POSTGRES_DB: aialchemy
      POSTGRES_USER: aialchemy
      POSTGRES_PASSWORD: aialchemy_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - aialchemy-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: aialchemy-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - aialchemy-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aialchemy-backend
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=development
      - DATABASE_URL=postgresql+asyncpg://aialchemy:aialchemy_dev_password@postgres:5432/aialchemy
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=development-secret-key-change-in-production
      - JWT_SECRET_KEY=development-jwt-secret
      - GOOGLE_CLOUD_PROJECT=aialchemy-dev
      - CORS_ORIGINS=http://localhost:3000,http://127.0.0.1:3000
    volumes:
      - ./backend:/app
      - /app/__pycache__
    depends_on:
      - postgres
      - redis
    networks:
      - aialchemy-network
    restart: unless-stopped

  # Frontend React App
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: aialchemy-frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_BASE_URL=http://localhost:8000
      - REACT_APP_ENVIRONMENT=development
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - aialchemy-network
    restart: unless-stopped

  # Nginx (for production-like testing)
  nginx:
    image: nginx:alpine
    container_name: aialchemy-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - backend
      - frontend
    networks:
      - aialchemy-network
    profiles:
      - production

volumes:
  postgres_data:
  redis_data:

networks:
  aialchemy-network:
    driver: bridge