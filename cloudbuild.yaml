# Google Cloud Build CI/CD Pipeline for AIAlchemy
# This configuration handles building, testing, and deploying both backend and frontend

steps:
  # Step 1: Setup and Cache Dependencies
  - name: 'gcr.io/cloud-builders/git'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "Starting AIAlchemy CI/CD Pipeline"
        echo "Branch: $BRANCH_NAME"
        echo "Commit: $COMMIT_SHA"
        git log --oneline -1

  # Step 2: Backend - Install Dependencies and Run Tests
  - name: 'python:3.11-slim'
    id: 'backend-test'
    dir: 'backend'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "🐍 Setting up Python backend environment"
        pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt
        
        echo "🧪 Running backend tests"
        pytest tests/ -v --cov=app --cov-report=xml --cov-report=term-missing
        
        echo "🔍 Running code quality checks"
        black --check app/ tests/ || (echo "❌ Black formatting check failed" && exit 1)
        isort --check-only app/ tests/ || (echo "❌ isort check failed" && exit 1)
        flake8 app/ tests/ || (echo "❌ Flake8 linting failed" && exit 1)
        mypy app/ || (echo "❌ MyPy type checking failed" && exit 1)

  # Step 3: Frontend - Install Dependencies and Run Tests
  - name: 'node:18-alpine'
    id: 'frontend-test'
    dir: 'frontend'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        echo "📦 Setting up Node.js frontend environment"
        npm ci --silent
        
        echo "🔧 Running TypeScript type checking"
        npm run type-check
        
        echo "🧪 Running frontend tests"
        npm run test -- --coverage --watchAll=false --testResultsProcessor=jest-sonar-reporter
        
        echo "🎨 Running ESLint"
        npm run lint
        
        echo "🏗️ Building frontend for production"
        npm run build

  # Step 4: Backend - Build Docker Image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'backend-build'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/aialchemy-repo/backend:$COMMIT_SHA'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/aialchemy-repo/backend:latest'
      - './backend'
    waitFor: ['backend-test']

  # Step 5: Frontend - Build Docker Image  
  - name: 'gcr.io/cloud-builders/docker'
    id: 'frontend-build'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/aialchemy-repo/frontend:$COMMIT_SHA'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/aialchemy-repo/frontend:latest'
      - './frontend'
    waitFor: ['frontend-test']

  # Step 6: Security - Container Vulnerability Scanning
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'security-scan'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "🛡️ Running container vulnerability scans"
        
        # Scan backend image
        gcloud container images scan us-central1-docker.pkg.dev/$PROJECT_ID/aialchemy-repo/backend:$COMMIT_SHA \
          --remote || echo "⚠️ Backend security scan completed with findings"
        
        # Scan frontend image  
        gcloud container images scan us-central1-docker.pkg.dev/$PROJECT_ID/aialchemy-repo/frontend:$COMMIT_SHA \
          --remote || echo "⚠️ Frontend security scan completed with findings"
    waitFor: ['backend-build', 'frontend-build']

  # Step 7: Database Migrations (Staging Environment)
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'database-migrate-staging'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "🗄️ Running database migrations on staging"
        
        # Connect to staging Cloud SQL and run migrations
        gcloud sql connect aialchemy-db-staging --user=aialchemy-user --quiet << 'EOF'
        -- Add your database migration commands here
        -- This is a placeholder for Alembic migrations
        SELECT 'Database migration completed for staging' as status;
        EOF
    waitFor: ['security-scan']

  # Step 8: Deploy to Staging Environment
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'deploy-staging'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "🚀 Deploying to staging environment"
        
        # Deploy backend to staging
        gcloud run deploy aialchemy-backend-staging \
          --image=us-central1-docker.pkg.dev/$PROJECT_ID/aialchemy-repo/backend:$COMMIT_SHA \
          --region=us-central1 \
          --platform=managed \
          --service-account=app-service-account@$PROJECT_ID.iam.gserviceaccount.com \
          --set-env-vars="ENVIRONMENT=staging" \
          --set-env-vars="GOOGLE_CLOUD_PROJECT=$PROJECT_ID" \
          --set-cloudsql-instances=$PROJECT_ID:us-central1:aialchemy-db-staging \
          --memory=2Gi \
          --cpu=2 \
          --min-instances=0 \
          --max-instances=10 \
          --concurrency=100 \
          --timeout=300 \
          --allow-unauthenticated
        
        # Get backend URL for frontend
        export BACKEND_URL=$(gcloud run services describe aialchemy-backend-staging \
          --region=us-central1 \
          --format='value(status.url)')
        
        # Deploy frontend to staging
        gcloud run deploy aialchemy-frontend-staging \
          --image=us-central1-docker.pkg.dev/$PROJECT_ID/aialchemy-repo/frontend:$COMMIT_SHA \
          --region=us-central1 \
          --platform=managed \
          --set-env-vars="REACT_APP_API_BASE_URL=$BACKEND_URL" \
          --set-env-vars="REACT_APP_ENVIRONMENT=staging" \
          --memory=1Gi \
          --cpu=1 \
          --min-instances=0 \
          --max-instances=5 \
          --concurrency=80 \
          --timeout=120 \
          --allow-unauthenticated
        
        echo "✅ Staging deployment completed"
        echo "🌐 Backend URL: $BACKEND_URL"
        echo "🌐 Frontend URL: $(gcloud run services describe aialchemy-frontend-staging --region=us-central1 --format='value(status.url)')"
    waitFor: ['database-migrate-staging']

  # Step 9: Integration Testing on Staging
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'integration-tests'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "🧪 Running integration tests on staging"
        
        # Get staging URLs
        export BACKEND_URL=$(gcloud run services describe aialchemy-backend-staging \
          --region=us-central1 --format='value(status.url)')
        export FRONTEND_URL=$(gcloud run services describe aialchemy-frontend-staging \
          --region=us-central1 --format='value(status.url)')
        
        # Health checks
        echo "🏥 Testing backend health endpoint"
        curl -f "$BACKEND_URL/health" || (echo "❌ Backend health check failed" && exit 1)
        
        echo "🏥 Testing frontend accessibility"
        curl -f "$FRONTEND_URL" || (echo "❌ Frontend accessibility check failed" && exit 1)
        
        # API endpoint tests
        echo "🔌 Testing API endpoints"
        curl -f "$BACKEND_URL/api/v1/status" || (echo "❌ API status check failed" && exit 1)
        
        echo "✅ Integration tests passed"
    waitFor: ['deploy-staging']

  # Step 10: Production Deployment (only on main branch)
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'deploy-production'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        if [[ "$BRANCH_NAME" != "main" ]]; then
          echo "🚫 Skipping production deployment (not main branch)"
          exit 0
        fi
        
        echo "🏭 Deploying to production environment"
        
        # Database migrations for production
        echo "🗄️ Running production database migrations"
        gcloud sql connect aialchemy-db --user=aialchemy-user --quiet << 'EOF'
        -- Production database migrations
        SELECT 'Production database migration completed' as status;
        EOF
        
        # Deploy backend to production with blue/green deployment
        gcloud run deploy aialchemy-backend \
          --image=us-central1-docker.pkg.dev/$PROJECT_ID/aialchemy-repo/backend:$COMMIT_SHA \
          --region=us-central1 \
          --platform=managed \
          --service-account=app-service-account@$PROJECT_ID.iam.gserviceaccount.com \
          --set-env-vars="ENVIRONMENT=production" \
          --set-env-vars="GOOGLE_CLOUD_PROJECT=$PROJECT_ID" \
          --set-cloudsql-instances=$PROJECT_ID:us-central1:aialchemy-db \
          --memory=4Gi \
          --cpu=2 \
          --min-instances=2 \
          --max-instances=100 \
          --concurrency=100 \
          --timeout=300 \
          --allow-unauthenticated
        
        # Get production backend URL
        export BACKEND_URL=$(gcloud run services describe aialchemy-backend \
          --region=us-central1 \
          --format='value(status.url)')
        
        # Deploy frontend to production
        gcloud run deploy aialchemy-frontend \
          --image=us-central1-docker.pkg.dev/$PROJECT_ID/aialchemy-repo/frontend:$COMMIT_SHA \
          --region=us-central1 \
          --platform=managed \
          --set-env-vars="REACT_APP_API_BASE_URL=$BACKEND_URL" \
          --set-env-vars="REACT_APP_ENVIRONMENT=production" \
          --memory=2Gi \
          --cpu=2 \
          --min-instances=1 \
          --max-instances=50 \
          --concurrency=80 \
          --timeout=120 \
          --allow-unauthenticated
        
        echo "🎉 Production deployment completed successfully!"
        echo "🌐 Backend URL: $BACKEND_URL"
        echo "🌐 Frontend URL: $(gcloud run services describe aialchemy-frontend --region=us-central1 --format='value(status.url)')"
    waitFor: ['integration-tests']

  # Step 11: Post-Deployment Health Checks and Notifications
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'post-deploy-checks'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "🏥 Running post-deployment health checks"
        
        if [[ "$BRANCH_NAME" == "main" ]]; then
          # Production health checks
          export BACKEND_URL=$(gcloud run services describe aialchemy-backend \
            --region=us-central1 --format='value(status.url)')
          export FRONTEND_URL=$(gcloud run services describe aialchemy-frontend \
            --region=us-central1 --format='value(status.url)')
          
          echo "🔍 Production health check"
          curl -f "$BACKEND_URL/health" || (echo "❌ Production backend health check failed" && exit 1)
          curl -f "$FRONTEND_URL" || (echo "❌ Production frontend health check failed" && exit 1)
          
          echo "✅ Production deployment verified and healthy"
          
          # Set up monitoring (optional)
          echo "📊 Setting up monitoring and alerting"
          # Add monitoring configuration here
          
        else
          echo "✅ Staging deployment completed and tested"
        fi
    waitFor: ['deploy-production']

# Build options
options:
  # Use high-performance machine for faster builds
  machineType: 'E2_HIGHCPU_8'
  
  # Enable detailed logging
  logging: CLOUD_LOGGING_ONLY
  
  # Set timeout for entire build (30 minutes)
  timeout: '1800s'
  
  # Environment variables available to all steps
  env:
    - 'CLOUDSDK_COMPUTE_ZONE=us-central1-a'
    - 'CLOUDSDK_CORE_PROJECT=$PROJECT_ID'

# Trigger configuration (when used with Cloud Build Triggers)
timeout: '1800s'

# Artifacts to store after build
artifacts:
  objects:
    location: 'gs://$PROJECT_ID-build-artifacts'
    paths: 
      - 'backend/coverage.xml'
      - 'frontend/coverage/lcov.info'
      - 'test-results.xml'